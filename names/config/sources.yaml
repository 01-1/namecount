        "sleep_ms": 250,
        "query_template": "SELECT ?id ?name ?description WHERE { ?item wdt:P31/wdt:P279* wd:Q95074 . BIND(REPLACE(STR(?item), \"http://www.wikidata.org/entity/\", \"\") AS ?id) ?item rdfs:label ?name . FILTER(LANG(?name) = \"en\") OPTIONAL { ?item schema:description ?description . FILTER(LANG(?description) = \"en\") } } LIMIT {limit} OFFSET {offset}"
      },
      "fields": {
        "name": "name",
        "source_id": "id",
        "description": "description"
      }
    }
  ]
}
